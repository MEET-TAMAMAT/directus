<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Rep Registration - TAMAMAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        /* Dark theme */
        [data-theme="dark"] body {
            background: #0f172a;
            color: #f8fafc;
        }

        .container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }

        [data-theme="dark"] .header h1 {
            color: #f8fafc;
        }

        .header p {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        [data-theme="dark"] .header p {
            color: #9ca3af;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .form-card {
            background: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-col {
            flex: 1;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
            font-size: 0.875rem;
        }

        [data-theme="dark"] .form-label {
            color: #d1d5db;
        }

        .required {
            color: #ef4444;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            background: white;
        }

        [data-theme="dark"] .form-input {
            background: #374151;
            border-color: #4b5563;
            color: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        [data-theme="dark"] .form-input::placeholder {
            color: #6b7280;
        }

        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.1em;
            cursor: pointer;
            color: #6b7280;
            padding: 0.25rem;
        }

        .password-toggle:hover {
            color: #374151;
        }

        [data-theme="dark"] .password-toggle {
            color: #9ca3af;
        }

        [data-theme="dark"] .password-toggle:hover {
            color: #d1d5db;
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        [data-theme="dark"] .divider::before {
            background: #4b5563;
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            color: #6b7280;
            font-size: 0.875rem;
            position: relative;
        }

        [data-theme="dark"] .divider span {
            background: #1e293b;
            color: #9ca3af;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            min-height: 1.25rem;
        }

        .help-text {
            color: #6b7280;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        [data-theme="dark"] .help-text {
            color: #9ca3af;
        }

        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 500;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        [data-theme="dark"] .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.3);
        }

        [data-theme="dark"] .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .form-col {
                margin-bottom: 1.5rem;
            }

            .form-col:last-child {
                margin-bottom: 0;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }

        /* Theme toggle for testing */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Toggle Theme</button>

    <div class="container">
        <div class="header">
            <h1>Join TAMAMAT as a Sales Representative</h1>
            <p>Fill in the information below to set up your account and start helping language schools discover our innovative teaching platform.</p>
        </div>

        <div class="form-card">
            <form id="salesForm">
                <div class="form-group">
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">
                                First Name <span class="required">*</span>
                            </label>
                            <input
                                type="text"
                                name="sales_rep_first_name"
                                class="form-input"
                                placeholder="John"
                                required
                                maxlength="50"
                            >
                            <div class="error-message"></div>
                        </div>
                        <div class="form-col">
                            <label class="form-label">
                                Last Name <span class="required">*</span>
                            </label>
                            <input
                                type="text"
                                name="sales_rep_last_name"
                                class="form-input"
                                placeholder="Smith"
                                required
                            >
                            <div class="error-message"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">
                                Email <span class="required">*</span>
                            </label>
                            <input
                                type="email"
                                name="sales_rep_email"
                                class="form-input"
                                placeholder="john@example.com"
                                required
                            >
                            <div class="error-message"></div>
                        </div>
                        <div class="form-col">
                            <label class="form-label">
                                Phone # <span class="required">*</span>
                            </label>
                            <input
                                type="tel"
                                name="sales_rep_phone_number"
                                class="form-input"
                                placeholder="+1 (555) 123-4567"
                                required
                            >
                            <div class="error-message"></div>
                        </div>
                    </div>
                </div>

                <div class="divider">
                    <span>🔐 Fill in the information below to set up your password</span>
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">
                                Enter your password <span class="required">*</span>
                            </label>
                            <div class="password-group">
                                <input
                                    type="password"
                                    name="sales_rep_password"
                                    class="form-input"
                                    placeholder="••••••••"
                                    required
                                    minlength="8"
                                >
                                <button type="button" class="password-toggle">👁️</button>
                            </div>
                            <div class="help-text">Minimum 8 characters required</div>
                            <div class="error-message"></div>
                        </div>
                        <div class="form-col">
                            <label class="form-label">
                                Confirm your password <span class="required">*</span>
                            </label>
                            <div class="password-group">
                                <input
                                    type="password"
                                    name="sales_rep_password_confirm"
                                    class="form-input"
                                    placeholder="••••••••"
                                    required
                                    minlength="8"
                                >
                                <button type="button" class="password-toggle">👁️</button>
                            </div>
                            <div class="error-message"></div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span class="btn-text">Create Sales Rep Account</span>
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>Creating Account...</span>
                    </div>
                </button>

                <div id="messages"></div>
            </form>
        </div>
    </div>

    <script>
        // Theme Management
        function initializeTheme() {
            const urlParams = new URLSearchParams(window.location.search);
            const savedTheme = localStorage.getItem('tamamat-theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            let theme = urlParams.get('theme') || savedTheme || (systemDark ? 'dark' : 'light');

            document.documentElement.setAttribute('data-theme', theme);
            window.currentTheme = theme;
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('tamamat-theme', newTheme);
            window.currentTheme = newTheme;
        }

        // Form Validation
        function validateField(field) {
            const value = field.value.trim();
            const errorDiv = field.parentElement.querySelector('.error-message');
            let isValid = true;
            let errorMessage = '';

            // Clear previous error
            field.classList.remove('error');
            if (errorDiv) errorDiv.textContent = '';

            // Required validation
            if (field.hasAttribute('required') && !value) {
                errorMessage = 'This field is required.';
                isValid = false;
            }

            // Email validation
            if (field.type === 'email' && value) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(value)) {
                    errorMessage = 'Please enter a valid email address.';
                    isValid = false;
                }
            }

            // Password validation
            if (field.name === 'sales_rep_password' && value) {
                if (value.length < 8) {
                    errorMessage = 'Password must be at least 8 characters long.';
                    isValid = false;
                }
            }

            // Password confirmation
            if (field.name === 'sales_rep_password_confirm' && value) {
                const password = document.querySelector('input[name="sales_rep_password"]').value;
                if (value !== password) {
                    errorMessage = 'Passwords do not match.';
                    isValid = false;
                }
            }

            // Phone validation
            if (field.type === 'tel' && value) {
                const phoneRegex = /^[\d\s\-\+\(\)]{10,}$/;
                if (!phoneRegex.test(value)) {
                    errorMessage = 'Please enter a valid phone number.';
                    isValid = false;
                }
            }

            // Show error
            if (!isValid) {
                field.classList.add('error');
                if (errorDiv) errorDiv.textContent = errorMessage;
            }

            return isValid;
        }

        // Password Toggle
        function setupPasswordToggles() {
            document.querySelectorAll('.password-toggle').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const input = toggle.previousElementSibling;
                    if (input.type === 'password') {
                        input.type = 'text';
                        toggle.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        toggle.textContent = '👁️';
                    }
                });
            });
        }

        // Form Submission
        async function submitToDirectus(formData) {
            try {
                const response = await fetch('https://admin.tamamat.com/items/form_sales_rep', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                return await response.json();
            } catch (error) {
                console.error('API submission error:', error);
                throw error;
            }
        }

        function showMessage(message, type) {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = `<div class="message ${type}">${message}</div>`;

            if (type === 'success') {
                setTimeout(() => {
                    messagesDiv.innerHTML = '';
                }, 8000);
            }
        }

        function setLoadingState(loading) {
            const btn = document.querySelector('.submit-btn');
            const btnText = btn.querySelector('.btn-text');
            const loadingDiv = btn.querySelector('.loading');

            if (loading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                loadingDiv.style.display = 'flex';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline';
                loadingDiv.style.display = 'none';
            }
        }

        // Form Setup
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            setupPasswordToggles();

            const form = document.getElementById('salesForm');

            // Real-time validation
            form.querySelectorAll('.form-input').forEach(input => {
                input.addEventListener('blur', () => validateField(input));
                input.addEventListener('input', () => {
                    if (input.classList.contains('error')) {
                        validateField(input);
                    }
                });
            });

            // Form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Validate all fields
                const inputs = form.querySelectorAll('.form-input[required]');
                let isValid = true;

                inputs.forEach(input => {
                    if (!validateField(input)) {
                        isValid = false;
                    }
                });

                if (!isValid) {
                    showMessage('Please correct the errors above before submitting.', 'error');
                    return;
                }

                setLoadingState(true);

                try {
                    // Prepare form data
                    const formData = new FormData(form);
                    const data = {};

                    for (let [key, value] of formData.entries()) {
                        data[key] = value;
                    }

                    // Add metadata
                    data.status = 'published';
                    data.form_theme = window.currentTheme;
                    data.submission_source = 'public_form';
                    data.submission_url = window.location.href;

                    // Submit to Directus
                    const result = await submitToDirectus(data);

                    showMessage('🎉 Welcome to TAMAMAT! Your sales representative account has been created successfully. You will receive a welcome email shortly.', 'success');
                    form.reset();

                    console.log('Form submitted successfully:', result);

                } catch (error) {
                    console.error('Submission failed:', error);
                    showMessage('There was an error creating your account. Please try again or contact support.', 'error');
                } finally {
                    setLoadingState(false);
                }
            });
        });
    </script>
</body>
</html>
