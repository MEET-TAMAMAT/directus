# Render deployment configuration for Directus
databases:
  - name: directus-postgres
    plan: free  # Use 'free' for development, 'standard-0' for production
    databaseName: directus
    user: directus_user

services:
  # Main Directus API service
  - type: web
    name: directus-api
    runtime: node
    plan: free  # Use 'free' for development, 'standard' for production
    buildCommand: |
      # Install dependencies
      npm install -g pnpm@10.27.0
      pnpm install --frozen-lockfile
      # Build the project
      pnpm build
      # Build the API specifically
      cd api && pnpm build
    startCommand: |
      node scripts/start-render.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_URL
        value: https://directus-api-5l62.onrender.com
      # Database configuration - Use connection string approach
      - key: DATABASE_URL
        fromDatabase:
          name: directus-postgres
          property: connectionString
      # Directus secrets
      - key: KEY
        generateValue: true
      - key: SECRET
        generateValue: true
      # Admin configuration - Force admin creation on bootstrap
      - key: ADMIN_EMAIL
        value: admin@directus.local
      - key: ADMIN_PASSWORD
        value: DirectusAdmin123!
      - key: INIT_ADMIN_EMAIL
        value: admin@directus.local
      - key: INIT_ADMIN_PASSWORD
        value: DirectusAdmin123!
      # Storage configuration
      - key: STORAGE_LOCATIONS
        value: local
      - key: STORAGE_LOCAL_DRIVER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: ./uploads
      # Logging and CORS
      - key: LOG_LEVEL
        value: info
      - key: CORS_ENABLED
        value: true
      - key: CORS_ORIGIN
        value: true

# Optional: Redis for caching (uncomment if needed)
# - type: redis
#   name: directus-redis
#   plan: starter