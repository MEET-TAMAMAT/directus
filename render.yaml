# Render deployment configuration for Directus
services:
  # Main Directus API service
  - type: web
    name: directus-api
    runtime: node
    plan: free  # Use 'free' for development, 'standard' for production
    buildCommand: |
      # Install dependencies
      npm install -g pnpm@10.27.0
      pnpm install --frozen-lockfile
      # Build the project
      pnpm build
      # Build the API specifically
      cd api && pnpm build
    startCommand: |
      cd api && node dist/cli/run.js start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_URL
        value: https://directus-api.onrender.com  # Replace with your actual Render URL
      # Database configuration - Directus expects individual DB variables
      - key: DB_CLIENT
        value: pg
      - key: DB_HOST
        fromDatabase:
          name: directus-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: directus-postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: directus-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: directus-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: directus-postgres
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: directus-postgres
          property: connectionString
      # Directus secrets
      - key: KEY
        generateValue: true
      - key: SECRET
        generateValue: true
      # Admin configuration
      - key: ADMIN_EMAIL
        value: meet.tamamat@gmail.com
      - key: ADMIN_PASSWORD
        generateValue: true
      # Storage configuration
      - key: STORAGE_LOCATIONS
        value: local
      - key: STORAGE_LOCAL_DRIVER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: ./uploads
      # Logging and CORS
      - key: LOG_LEVEL
        value: info
      - key: CORS_ENABLED
        value: true
      - key: CORS_ORIGIN
        value: true

# PostgreSQL database
databases:
  - name: directus-postgres
    plan: free  # Use 'free' for development, 'standard-0' for production
    databaseName: directus
    user: directus_user

# Optional: Redis for caching (uncomment if needed)
